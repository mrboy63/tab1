<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Listening Tests</title>
<style>
body{font-family:Arial;padding:20px;background:#f5f5f5}
.test{margin:20px 0;padding:15px;background:white;border-radius:10px}
button{margin:5px;padding:8px 12px}
.correct{color:green}
.wrong{color:red}
</style>
</head>

<body>

<h1>Listening Practice</h1>

<select id="testSelect" onchange="loadTest()">
<option value="0">Trộn 15</option>
<option value="1">Trộn 23</option>
</select>

<div id="quiz"></div>

<button onclick="check()">Check Answers</button>

<h2 id="score"></h2>

<script>

const tests = [
[
"Long and red",
"Sick",
"15",
"Marketplace",
"Go to the theatre and play sports"
],
[
"The town hall",
"A university area",
"Persuading his family",
"10000",
"To work in a business"
]
];

let current=0;

function loadTest(){
current=document.getElementById("testSelect").value;
render();
}

function render(){
let html="";
tests[current].forEach((q,i)=>{
html+=`
<div class="test">
${i+1}. ${q}<br>
<input id="q${i}">
<span id="r${i}"></span>
</div>`;
});
document.getElementById("quiz").innerHTML=html;
}

function check(){
let score=0;
tests[current].forEach((a,i)=>{
let user=document.getElementById("q"+i).value.trim();
let r=document.getElementById("r"+i);

if(user.toLowerCase()==a.toLowerCase()){
r.innerHTML=" ✔";
r.className="correct";
score++;
}else{
r.innerHTML=" ✘ ("+a+")";
r.className="wrong";
}
});
document.getElementById("score").innerText="Score: "+score+"/"+tests[current].length;
}

render();

</script>

</body>
</html>
