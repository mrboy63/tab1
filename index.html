<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Listening Practice</title>
<style>
body{font-family:Arial;padding:20px}
.question{margin:10px 0}
.correct{color:green}
.wrong{color:red}
</style>
</head>

<body>

<h1>Listening Practice</h1>

<div id="quiz"></div>

<button onclick="check()">Check Answers</button>

<h2 id="score"></h2>

<script>
const data = [
{q:"Long and red",a:"Long and red"},
{q:"Sick",a:"Sick"},
{q:"15",a:"15"},
{q:"Marketplace",a:"Marketplace"},
{q:"Go to the theatre and play sports",a:"Go to the theatre and play sports"},
{q:"Quarter to eight",a:"Quarter to eight"},
{q:"One",a:"One"},
{q:"2 weeks",a:"2 weeks"},
{q:"Go to the park",a:"Go to the park"},
{q:"Play golf",a:"Play golf"}
];

let html="";

data.forEach((item,i)=>{
html+=`
<div class="question">
${i+1}. ${item.q}<br>
<input id="q${i}" placeholder="Your answer">
<span id="r${i}"></span>
</div>
`;
});

document.getElementById("quiz").innerHTML=html;

function check(){
let score=0;
data.forEach((item,i)=>{
let user=document.getElementById("q"+i).value.trim();
let result=document.getElementById("r"+i);

if(user.toLowerCase()==item.a.toLowerCase()){
result.innerHTML=" ✔";
result.className="correct";
score++;
}else{
result.innerHTML=" ✘ ("+item.a+")";
result.className="wrong";
}
});
document.getElementById("score").innerText="Score: "+score+"/"+data.length;
}
</script>

</body>
</html>
